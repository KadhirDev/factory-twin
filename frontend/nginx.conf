server {
    listen       80;
    server_name  localhost;

    # Serve built Vite app
    root   /usr/share/nginx/html;
    index  index.html;

    # ── SPA fallback ────────────────────────────────────────────────────────
    # For any route that is NOT a real file or directory,
    # return index.html so React Router handles it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — cache aggressively ──────────────────────────────────
    # Vite fingerprints asset filenames (e.g. index-Abc123.js),
    # so long cache headers are safe here.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy — forward /api calls to FastAPI backend ───────────────────
    # Keeps browser same-origin so no CORS issues in production.
    location /api/ {
        proxy_pass         http://factory-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript
                    application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}