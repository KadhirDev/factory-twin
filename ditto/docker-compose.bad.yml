version: '3.8'

services:
  ditto:
    image: eclipse/ditto:latest
    container_name: ditto
    ports:
      - "8080:8080"
    environment:
      - DITTO_HTTP_PORT=8080
    depends_on:
      - mongo
      - policies

  mongo:
    image: mongo:6
    container_name: ditto-mongo
    ports:
      - "27017:27017"

  policies:
    image: eclipse/ditto-policies:latest
    container_name: ditto-policies